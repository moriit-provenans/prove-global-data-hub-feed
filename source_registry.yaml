# PROVE Global Data Hub — source registry（REQ-007 P1-O 本体／REQ-008–010 合流）
# 目的: 「次に何か聞かれたら台帳で即答できる」状態。コレクター化しない層も含む。
# スキーマ: id / name / url / free_paid / api / frequency / grain_axes /
#           how_to_fetch(3行) / layer(always|annual|ondemand) + status/collector/feed

updated: 2026-07-13
owner: Atlas
req_refs:
  - REQ-SMITH-20260713-007  # P1-O
  - REQ-SMITH-20260713-008
  - REQ-SMITH-20260713-009
  - REQ-SMITH-20260713-010
entry_count: 84
entry_count_target: "40-90"
notes_ja: >
  grain_axes は細分化5軸（time / spatial / industry / income / firm_size）の該当のみ列挙。
  layer=always は常設コレクター／フィード、annual は年1バッチ、ondemand は台帳＋手順のみ。
  2026-07-13: REQ-007 P1-O 初版完成（REQ-008–010 合流・83件）。
  2026-07-13: REQ-008 P1-R/S — market_daily / events_calendar / GPR stub 追加（84件）。

sources:
  # ─── Aggregators / meta ───────────────────────────────────────────
  - id: dbnomics
    name: DBnomics
    url: https://db.nomics.world/
    api: https://api.db.nomics.world/v22/
    free_paid: free
    frequency: varies_by_provider
    grain_axes: [time, industry]
    how_to_fetch:
      - "1. GET api.db.nomics.world/v22/series?provider_code=OECD&dataset_code=MEI&…"
      - "2. 系列コードは /providers /datasets で探索。ページングは offset/limit"
      - "3. OECD MEI・BIS・Eurostat は個別APIよりここ経由を優先（REQ-007 P1-J 判定済）"
    layer: always
    status: verified_architecture
    feed: macro_monthly / macro_quarterly (via provider)
    notes_ja: 93機関統一API。個別コレクター削減の本命。

  - id: fred
    name: FRED (Federal Reserve Bank of St. Louis)
    url: https://fred.stlouisfed.org/
    api: https://api.stlouisfed.org/fred/
    free_paid: free
    frequency: daily_to_monthly
    grain_axes: [time]
    how_to_fetch:
      - "1. FRED API key 無料登録 → ~/.atlas_secrets/.env に FRED_API_KEY="
      - "2. collect_market_daily.py が FX・Brent/WTI/Gold/Copper を取得"
      - "3. キー未設定時は FX を Frankfurter(ECB) にフォールバック、コモディティは空系列"
    layer: always
    status: implemented
    collector: tools/collectors/collect_market_daily.py
    feed: timeseries/market_daily.json
    notes_ja: REQ-008 P1-R。2026-07-13 実装（キー無しでも骨格＋FX）。

